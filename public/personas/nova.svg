<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="nova-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2D2D35"/>
      <stop offset="1" stop-color="#1C1C22"/>
    </linearGradient>
    <radialGradient id="nova-body" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#FFE7D0"/>
      <stop offset="1" stop-color="#FF8B3D"/>
    </radialGradient>
    <radialGradient id="nova-eye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FF6B00"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="100" fill="url(#nova-bg)"/>
  <!-- soft halo -->
  <circle cx="100" cy="100" r="70" fill="#FF6B00" opacity="0.08"/>
  <!-- ears / side speakers -->
  <ellipse cx="50" cy="105" rx="10" ry="16" fill="#FF8B3D"/>
  <ellipse cx="150" cy="105" rx="10" ry="16" fill="#FF8B3D"/>
  <!-- rounded head -->
  <ellipse cx="100" cy="100" rx="55" ry="58" fill="url(#nova-body)"/>
  <!-- happy eyes -->
  <circle cx="82" cy="92" r="9" fill="#1C1C22"/>
  <circle cx="118" cy="92" r="9" fill="#1C1C22"/>
  <circle cx="84" cy="89" r="3" fill="#FFFFFF"/>
  <circle cx="120" cy="89" r="3" fill="#FFFFFF"/>
  <!-- cheeks -->
  <circle cx="72" cy="112" r="6" fill="#FF6B00" opacity="0.45"/>
  <circle cx="128" cy="112" r="6" fill="#FF6B00" opacity="0.45"/>
  <!-- smile -->
  <path d="M82 124 Q100 138 118 124" stroke="#1C1C22" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- antenna with heart -->
  <line x1="100" y1="42" x2="100" y2="55" stroke="#FF6B00" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 36 m-6 0 a6 6 0 1 1 6 6 a6 6 0 1 1 6 -6" fill="#FF6B00"/>
</svg>
