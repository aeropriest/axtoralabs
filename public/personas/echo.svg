<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="echo-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2D2D35"/>
      <stop offset="1" stop-color="#1C1C22"/>
    </linearGradient>
    <radialGradient id="echo-body" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFD6B5"/>
    </radialGradient>
    <linearGradient id="echo-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8B3D"/>
      <stop offset="1" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="100" fill="url(#echo-bg)"/>
  <!-- soft glow -->
  <circle cx="100" cy="100" r="68" fill="#FF6B00" opacity="0.06"/>
  <!-- gentle antenna with pulse -->
  <line x1="100" y1="42" x2="100" y2="56" stroke="#FFD6B5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="40" r="4" fill="url(#echo-accent)"/>
  <circle cx="100" cy="40" r="9" fill="url(#echo-accent)" opacity="0.25"/>
  <!-- soft rounded head -->
  <path d="M50 92 Q50 60 100 60 Q150 60 150 92 L150 130 Q150 152 100 152 Q50 152 50 130 Z" fill="url(#echo-body)"/>
  <!-- caring eyes (softly closed crescents) -->
  <path d="M76 96 Q86 104 96 96" stroke="#1C1C22" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M104 96 Q114 104 124 96" stroke="#1C1C22" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- soft cheeks -->
  <circle cx="70" cy="112" r="5" fill="#FF6B00" opacity="0.3"/>
  <circle cx="130" cy="112" r="5" fill="#FF6B00" opacity="0.3"/>
  <!-- gentle smile -->
  <path d="M86 124 Q100 132 114 124" stroke="#1C1C22" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- chest plus -->
  <rect x="78" y="158" width="44" height="14" rx="4" fill="#33333D"/>
  <rect x="96" y="160" width="8" height="10" rx="1" fill="url(#echo-accent)"/>
  <rect x="92" y="163" width="16" height="4" rx="1" fill="url(#echo-accent)"/>
</svg>
